<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <defs>
    <!-- 主背景渐变 - 更丰富的层次 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3"/>
      <stop offset="40%" style="stop-color:#4f46e5"/>
      <stop offset="70%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    
    <!-- 顶部高光渐变 -->
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    
    <!-- 柱形渐变 -->
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
  </defs>
  
  <!-- 背景：圆角方形 -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#bgGradient)"/>
  
  <!-- 顶部高光层 -->
  <rect x="10" y="10" width="180" height="90" rx="40" fill="url(#highlightGradient)"/>
  
  <!-- 频次柱状图 - 垂直居中 -->
  <g transform="translate(40, 60)">
    <!-- 柱1 -->
    <rect x="0" y="40" width="20" height="40" rx="4" fill="url(#barGradient)" opacity="0.4"/>
    <!-- 柱2 -->
    <rect x="25" y="25" width="20" height="55" rx="4" fill="url(#barGradient)" opacity="0.6"/>
    <!-- 柱3 - 最高 -->
    <rect x="50" y="0" width="20" height="80" rx="4" fill="white"/>
    <!-- 柱4 -->
    <rect x="75" y="20" width="20" height="60" rx="4" fill="url(#barGradient)" opacity="0.7"/>
    <!-- 柱5 -->
    <rect x="100" y="35" width="20" height="45" rx="4" fill="url(#barGradient)" opacity="0.5"/>
  </g>
</svg>
